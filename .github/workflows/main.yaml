name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # အခြေခံ Gradle Setup ကို ပုံမှန်အတိုင်းပဲ လုပ်ဆောင်ခြင်း
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ဤနေရာတွင်သာ Folder ထဲဝင်ပြီး Build လုပ်ရန် အမိန့်ပေးခြင်း
    - name: Build with Gradle
      working-directory: Ai-morden
      run: gradle assembleDebug

    # APK ဖိုင်ကို လမ်းကြောင်းမှန်ကန်စွာဖြင့် သိမ်းဆည်းခြင်း
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ai-modern-app
        path: Ai-morden/app/build/outputs/apk/debug/app-debug.apk

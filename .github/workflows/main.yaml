name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Folder လမ်းကြောင်းကို အတိအကျ ညွှန်ပြပြီး Setup လုပ်ခြင်း
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        build-root-directory: Ai-morden

    # working-directory ကို သီးသန့်သတ်မှတ်ပြီး အမှားကင်းစွာ Build လုပ်ခြင်း
    - name: Build with Gradle
      working-directory: Ai-morden
      run: gradle assembleDebug

    # ထွက်လာမယ့် APK ကို လမ်းကြောင်းမှန်မှန်ဖြင့် သိမ်းဆည်းခြင်း
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ai-modern-app
        path: Ai-morden/app/build/outputs/apk/debug/app-debug.apk

name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # GitHub Actions ကို Ai-morden Folder ထဲဝင်ပြီး Gradle Setup လုပ်ခိုင်းခြင်း
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        build-root-directory: Ai-morden

    # Folder ထဲကို 'cd' နဲ့ အရင်ဝင်ပြီးမှ Build လုပ်ခိုင်းခြင်း
    - name: Build with Gradle
      run: |
        cd Ai-morden
        gradle assembleDebug

    # ထွက်လာမယ့် APK ကို လမ်းကြောင်းမှန်အောင် သတ်မှတ်ပြီး သိမ်းဆည်းခြင်း
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ai-modern-app
        path: Ai-morden/app/build/outputs/apk/debug/app-debug.apk
